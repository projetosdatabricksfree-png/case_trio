name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PROJECT_DIR: desafioengenheirodedadostrio/trio-data-challenge

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          cp .env.example .env
          docker compose config -q
          echo "compose config: OK"

      - name: ShellCheck (scripts)
        working-directory: ${{ env.PROJECT_DIR }}
        run: shellcheck scripts/*.sh

      - name: yamllint
        run: |
          python3 -m pip install --quiet --user yamllint
          python3 -m yamllint -c .yamllint.yml .

      - name: Gitleaks (secret scan)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.18.4 \
            detect --no-git --source=/repo --config=/repo/.gitleaks.toml \
            --redact --verbose --exit-code=1

  integration:
    name: Integration (compose up + smoke)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bring up the stack (wait for healthy)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          cp .env.example .env
          docker compose up -d --wait --wait-timeout 300

      - name: Smoke test
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./scripts/smoke-test.sh

      - name: Diagnostics on failure
        if: failure()
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          docker compose ps
          docker compose logs --no-color --tail=200

      - name: Tear down
        if: always()
        working-directory: ${{ env.PROJECT_DIR }}
        run: docker compose down -v
