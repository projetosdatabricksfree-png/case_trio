name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PROJECT_DIR: desafioengenheirodedadostrio/trio-data-challenge

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate docker-compose
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          cp .env.example .env
          docker compose config -q
          echo "compose config: OK"

      - name: ShellCheck (scripts)
        working-directory: ${{ env.PROJECT_DIR }}
        run: shellcheck scripts/*.sh desafio-3/backup/*.sh

      - name: yamllint
        run: |
          python3 -m pip install --quiet --user yamllint
          python3 -m yamllint -c .yamllint.yml .

      - name: Gitleaks (secret scan)
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.18.4 \
            detect --no-git --source=/repo --config=/repo/.gitleaks.toml \
            --redact --verbose --exit-code=1

      - name: Ruff (Python lint do seeder, best-effort)
        continue-on-error: true
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python3 -m pip install --quiet --user ruff
          python3 -m ruff check desafio-1/seed desafio-2/pipeline

  integration:
    name: Integration (compose up + smoke)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Bring up the stack (wait for healthy)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          cp .env.example .env
          docker compose up -d --wait --wait-timeout 300

      - name: Smoke test
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./scripts/smoke-test.sh

      - name: Schema + seed smoke (migrate, seed ~20k, index, sanity)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          make migrate
          make seed-smoke
          make index
          make sanity
          # Asserções: seed minúsculo populou as 4 tabelas, todos os tipos
          # presentes e há divergências de conciliação para a Q2 da Sprint 02.
          read -r tx types div < <(docker compose exec -T timescaledb \
            psql -U "${POSTGRES_USER:-trio}" -d trio_transactions -tAF' ' -c "
              SELECT
                (SELECT count(*) FROM transactions),
                (SELECT count(DISTINCT type) FROM transactions),
                (SELECT count(*) FROM reconciliation_events WHERE abs(difference) > 0.01);
            ")
          echo "transactions=$tx types=$types divergent_recon=$div"
          test "$tx" -ge 15000 || { echo "FAIL: poucas transações"; exit 1; }
          test "$types" -eq 4  || { echo "FAIL: nem todos os tipos presentes"; exit 1; }
          test "$div" -ge 1    || { echo "FAIL: sem divergências de conciliação"; exit 1; }
          echo "seed smoke assertions: OK"

      - name: Sprint 02 — CAggs, políticas & queries (smoke)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          make index-s2
          make caggs
          make policies
          make queries   # Q1–Q4 + percentis + gapfill; ON_ERROR_STOP valida execução
          # Asserção: os 2 continuous aggregates materializaram dados.
          read -r ca cb < <(docker compose exec -T timescaledb \
            psql -U "${POSTGRES_USER:-trio}" -d trio_transactions -tAF' ' -c "
              SELECT
                (SELECT count(*) FROM cagg_volume_by_type_hourly),
                (SELECT count(*) FROM cagg_settlement_by_institution_daily);
            ")
          echo "cagg_A=$ca cagg_B=$cb"
          test "$ca" -ge 1 || { echo "FAIL: CAgg A não materializou"; exit 1; }
          test "$cb" -ge 1 || { echo "FAIL: CAgg B não materializou"; exit 1; }
          echo "sprint 02 assertions: OK"

      - name: Sprint 03 — Legado (schema, seed, índices & queries)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          make migrate-legado
          make seed-legado    # reusa a imagem trio-seeder:local (já buildada)
          make index-legado
          make analyze-legado
          make queries-legado # ON_ERROR_STOP valida execução das 2 queries
          # Asserções: tabelas populadas, toda conta tem config (FK coerente) e
          # ambas as queries do legado retornam linhas.
          read -r usr acc orphan q32 q33 < <(docker compose exec -T postgres-legado \
            psql -U "${POSTGRES_USER:-trio}" -d trio_legado -tAF' ' -c "
              SELECT
                (SELECT count(*) FROM users),
                (SELECT count(*) FROM accounts),
                (SELECT count(*) FROM accounts a
                   LEFT JOIN institution_configs ic ON ic.institution_code = a.institution_code
                   WHERE ic.institution_code IS NULL),
                (SELECT count(*) FROM accounts WHERE status='active'),
                (SELECT count(*) FROM institution_configs WHERE active AND settlement_window='D+1');
            ")
          echo "users=$usr accounts=$acc orphan_accounts=$orphan active_accounts=$q32 d1_configs=$q33"
          test "$usr" -ge 1     || { echo "FAIL: sem users"; exit 1; }
          test "$acc" -ge 1     || { echo "FAIL: sem accounts"; exit 1; }
          test "$orphan" -eq 0  || { echo "FAIL: accounts sem institution_config (FK incoerente)"; exit 1; }
          test "$q32" -ge 1     || { echo "FAIL: Q3.2 não retornaria linhas"; exit 1; }
          test "$q33" -ge 1     || { echo "FAIL: Q3.3 não retornaria linhas"; exit 1; }
          echo "sprint 03 assertions: OK"

      - name: Sprint 04 — ClickHouse (schema, carga, MVs, dictionary & queries)
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          CLICKHOUSE_USER: trio
          CLICKHOUSE_PASSWORD: trio2024
        run: |
          # Ordem importa: o legado já foi semeado (passo anterior), então o
          # dictionary acha institution_configs. Schema ANTES da carga -> as MVs
          # materializam nos INSERTs do seed.
          make migrate-ch
          make seed-ch-smoke    # ~200k (reusa a imagem trio-seeder:local já buildada)
          make queries-ch       # flagship + dictGet + reads -Merge + cria a tabela do dedup
          make optimize-ch
          # Asserções: base carregada, MVs materializaram, dictionary em uso e dedup
          # do ReplacingMergeTree. IFS=tab: o nome da instituição tem espaços.
          IFS=$'\t' read -r raw mvd mvf dname ddedup < <(docker compose exec -T clickhouse \
            clickhouse-client --user trio --password trio2024 -d trio_analytics -q "
              SELECT
                (SELECT count() FROM transactions),
                (SELECT count() FROM tx_daily_summary),
                (SELECT count() FROM tx_status_funnel),
                (SELECT dictGet('trio_analytics.dict_institutions','institution_name','00000000')),
                (SELECT count() FROM transactions_dedup_demo)
              FORMAT TSV")
          echo "raw=$raw mv_daily=$mvd mv_funnel=$mvf dict_name='$dname' dedup_rows=$ddedup"
          test "$raw" -ge 150000             || { echo "FAIL: poucas transações no ClickHouse"; exit 1; }
          test "$mvd" -ge 1                  || { echo "FAIL: MV diária não materializou"; exit 1; }
          test "$mvf" -ge 1                  || { echo "FAIL: MV funil não materializou"; exit 1; }
          test "$dname" = "Banco do Brasil S.A." || { echo "FAIL: dictGet não retornou o nome esperado"; exit 1; }
          test "$ddedup" -eq 1              || { echo "FAIL: dedup do ReplacingMergeTree != 1 linha"; exit 1; }
          # Flagship sub-segundo retorna linhas.
          frows=$(docker compose exec -T clickhouse clickhouse-client --user trio --password trio2024 \
            -d trio_analytics --multiquery < desafio-1/queries/clickhouse/grafana_pix_success.sql | wc -l)
          echo "flagship_rows=$frows"
          test "$frows" -ge 1 || { echo "FAIL: flagship não retornou linhas"; exit 1; }
          # API servindo JSON real do ClickHouse (ClickHouse servindo aplicação).
          curl -fsS "http://localhost:8000/transactions/volume/realtime?window_minutes=1440" \
            | grep -q '"count"' || { echo "FAIL: API não retornou JSON esperado"; exit 1; }
          echo "sprint 04 assertions: OK"

      - name: Sprint 05 — Pipelines (TS -> CH idempotente, mutação, refs, DLQ)
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          CLICKHOUSE_USER: trio
          CLICKHOUSE_PASSWORD: trio2024
        run: |
          # Tabelas de controle (CH) + índice de mutação (TS). Origem (TS) já semeada
          # (smoke) e destino (CH) migrado nos passos anteriores. Para o serviço
          # contínuo ANTES das asserções -> contagens determinísticas.
          docker compose stop pipeline
          make migrate-pipeline
          make pipeline-once    # 1ª drenagem (insert + mutate)
          n1=$(docker compose exec -T clickhouse clickhouse-client --user trio --password trio2024 \
            -d trio_analytics -q "SELECT count() FROM transactions FINAL")
          make pipeline-once    # 2ª: idempotente -> contagem (FINAL) não muda
          n2=$(docker compose exec -T clickhouse clickhouse-client --user trio --password trio2024 \
            -d trio_analytics -q "SELECT count() FROM transactions FINAL")
          echo "final_after_run1=$n1 final_after_run2=$n2"
          test "$n1" = "$n2" || { echo "FAIL: pipeline não idempotente (contagem mudou)"; exit 1; }
          make pipeline-refs              # PG -> CH ref_institutions + SYSTEM RELOAD DICTIONARY
          make pipeline-mutation-demo     # pending -> settled refletido no CH (valida internamente)
          docker compose run --rm --no-deps -T pipeline python sync_ts_to_ch.py --demo-dlq
          # Asserções agregadas (IFS=tab: o nome da instituição tem espaços).
          IFS=$'\t' read -r refs dname runs_ok dlq < <(docker compose exec -T clickhouse \
            clickhouse-client --user trio --password trio2024 -d trio_analytics -q "
              SELECT
                (SELECT count() FROM ref_institutions),
                (SELECT dictGet('trio_analytics.dict_institutions','institution_name','00000000')),
                (SELECT count() FROM pipeline_runs WHERE pipeline='ts_to_ch' AND status='ok'),
                (SELECT count() FROM pipeline_dlq)
              FORMAT TSV")
          echo "ref_institutions=$refs dict='$dname' runs_ok=$runs_ok dlq=$dlq"
          test "$refs" -ge 1                      || { echo "FAIL: ref_institutions vazia"; exit 1; }
          test "$dname" = "Banco do Brasil S.A."  || { echo "FAIL: dictGet após reload"; exit 1; }
          test "$runs_ok" -ge 1                    || { echo "FAIL: sem run 'ok' em pipeline_runs"; exit 1; }
          test "$dlq" -ge 1                        || { echo "FAIL: DLQ vazia após demo"; exit 1; }
          echo "sprint 05 assertions: OK"

      - name: Sprint 06 — Ops & Observabilidade (backup, recovery, runbook, dashboards, alertas)
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          CLICKHOUSE_USER: trio
          CLICKHOUSE_PASSWORD: trio2024
        run: |
          # Backup dos 3 bancos (o orquestrador valida cada artefato e o status do CH).
          bash desafio-3/backup/run_backups.sh
          # Recovery do TimescaleDB: perda -> restore staging -> validação (antes == depois).
          make recovery-demo
          # Runbook de storage: validação READ-ONLY (não altera nada).
          make runbook-storage-check
          # Observabilidade provisionada (Grafana sobe com volume limpo no CI):
          # 4 dashboards + >= 1 regra de alerta. >= 2 dashboards consultam o ClickHouse.
          dash=$(curl -s -u admin:admin "http://localhost:3000/api/search?type=dash-db" | jq 'length')
          rules=$(curl -s -u admin:admin "http://localhost:3000/api/v1/provisioning/alert-rules" | jq 'length')
          echo "dashboards=$dash alert_rules=$rules"
          test "$dash" -ge 4  || { echo "FAIL: < 4 dashboards provisionados"; exit 1; }
          test "$rules" -ge 1 || { echo "FAIL: nenhuma regra de alerta provisionada"; exit 1; }
          # Artefatos de backup presentes e não-vazios (um por banco).
          test -s "$(ls -1 desafio-3/backup/artifacts/timescaledb_*.dump      | head -1)" || { echo "FAIL: backup TS"; exit 1; }
          test -s "$(ls -1 desafio-3/backup/artifacts/postgres_legado_*.dump  | head -1)" || { echo "FAIL: backup PG"; exit 1; }
          test -s "$(ls -1 desafio-3/backup/artifacts/trio_analytics_*.zip    | head -1)" || { echo "FAIL: backup CH"; exit 1; }
          echo "sprint 06 assertions: OK"

      - name: Diagnostics on failure
        if: failure()
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          docker compose ps
          docker compose logs --no-color --tail=200

      - name: Tear down
        if: always()
        working-directory: ${{ env.PROJECT_DIR }}
        run: docker compose down -v
