###############################################################################
#  Trio Grupo Financeiro — Desafio Técnico: Engenheiro de Dados Sênior
#  docker-compose.yml (ambiente base)
#
#  Uso:
#    cp .env.example .env
#    docker-compose up -d
#
#  Serviços:
#    - TimescaleDB 2.x  (porta 5432) — banco transacional principal
#    - PostgreSQL 16     (porta 5433) — legado transacional
#    - ClickHouse        (porta 8123 HTTP / 9000 native) — aplicações e consultas
#    - Grafana           (porta 3000) — dashboards
#
#  Este arquivo é o ponto de partida. Evolua conforme necessário:
#  adicione volumes, scripts de init, serviços extras (Kafka, Debezium, etc).
###############################################################################

# Compose Spec: a chave `version` foi removida de propósito (obsoleta/ignorada nas
# versões atuais do Docker Compose v2+; sua presença só gera warning).

x-common-env: &pg-common
  POSTGRES_USER: ${POSTGRES_USER:-trio}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trio2024}

# Rotação de logs padrão para todos os serviços — evita que os logs dos
# containers encham o disco em execuções longas (boa prática de operação).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ===========================================================================
  #  TimescaleDB — Banco transacional principal
  #  Imagem oficial Timescale com extensões habilitadas
  # ===========================================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: trio-timescaledb
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "5432:5432"
    environment:
      <<: *pg-common
      POSTGRES_DB: trio_transactions
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init/timescaledb:/docker-entrypoint-initdb.d:ro
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=timescaledb"
      - "-c"
      - "timescaledb.telemetry_level=off"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=5"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "pg_stat_statements.track=all"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trio} -d trio_transactions"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

  # ===========================================================================
  #  PostgreSQL 16 — Legado transacional
  #  Simula o banco legado que pode migrar para Aurora/RDS
  # ===========================================================================
  postgres-legado:
    image: postgres:16-bookworm
    container_name: trio-postgres-legado
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "5433:5432"
    environment:
      <<: *pg-common
      POSTGRES_DB: trio_legado
    volumes:
      - postgres_legado_data:/var/lib/postgresql/data
      - ./init/postgres-legado:/docker-entrypoint-initdb.d:ro
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "pg_stat_statements.track=all"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trio} -d trio_legado"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================================================
  #  ClickHouse — Motor de dados para aplicações e consultas
  #  HTTP API na 8123, Native protocol na 9000
  # ===========================================================================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: trio-clickhouse
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-trio}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-trio2024}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_DB: trio_analytics
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./init/clickhouse:/docker-entrypoint-initdb.d:ro
      # Sprint 06: disco de backup nativo (BACKUP TO Disk). Montado como ARQUIVO
      # ÚNICO p/ não esconder os config.d da imagem oficial (listen_host etc).
      - ./desafio-3/clickhouse/config.d/backup_disk.xml:/etc/clickhouse-server/config.d/backup_disk.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "${CLICKHOUSE_USER:-trio}", "--password", "${CLICKHOUSE_PASSWORD:-trio2024}", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

  # ===========================================================================
  #  Grafana — Dashboards e observabilidade
  #  Acesso: http://localhost:3000 (admin / admin)
  #  Datasources pré-configurados via provisioning
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: trio-grafana
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./desafio-3/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      timescaledb:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres-legado:
        condition: service_healthy
    healthcheck:
      # A imagem oficial do Grafana é Alpine-based e traz o wget do BusyBox.
      # start_period generoso: no boot o Grafana instala o plugin do ClickHouse
      # (GF_INSTALL_PLUGINS) — download de rede que pode levar dezenas de segundos.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  # ===========================================================================
  #  API — FastAPI + Uvicorn servindo o ClickHouse (Desafio 1 / Parte C, RF-3.5)
  #  ClickHouse servindo APLICAÇÃO: volume em tempo real + saúde por instituição.
  #  Acesso: http://localhost:8000 (docs em /docs). Requer schema+carga do CH.
  # ===========================================================================
  api:
    build: ./desafio-1/api
    image: trio-api:local
    container_name: trio-api
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8000:8000"
    environment:
      CH_HOST: clickhouse
      CH_HTTP_PORT: "8123"
      CH_DATABASE: trio_analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-trio}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-trio2024}
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      # A imagem python:slim não traz curl/wget; usamos urllib (sempre presente).
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  #  Pipeline principal — micro-batch idempotente TimescaleDB -> ClickHouse
  #  (Desafio 2, RF-4.1/4.2/4.3). Serviço de LONGA DURAÇÃO (loop contínuo, poll):
  #  lê por watermark derivado COALESCE(settled_at, created_at) e deduplica via
  #  ReplacingMergeTree. Requer `make migrate-pipeline` (tabelas de controle);
  #  enquanto não houver schema, espera com backoff (fica healthy via heartbeat).
  #  Demonstração determinística: `make pipeline-once`.
  # ===========================================================================
  pipeline:
    build: ./desafio-2/pipeline
    image: trio-pipeline:local
    container_name: trio-pipeline
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *pg-common
      PGHOST: timescaledb
      PGPORT: "5432"
      PGDATABASE: trio_transactions
      CH_HOST: clickhouse
      CH_HTTP_PORT: "8123"
      CH_DATABASE: trio_analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-trio}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-trio2024}
      PIPELINE_POLL_S: ${PIPELINE_POLL_S:-10}
      PIPELINE_BATCH: ${PIPELINE_BATCH:-50000}
    depends_on:
      timescaledb:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      # Heartbeat tocado no topo de cada ciclo/batch (antes do DB) -> healthy mesmo
      # aguardando o schema ou durante backfills longos. Vivo se tocado há < 60s.
      test: ["CMD-SHELL", "python -c \"import os,time,sys; sys.exit(0 if os.path.exists('/tmp/pipeline.heartbeat') and time.time()-os.path.getmtime('/tmp/pipeline.heartbeat')<60 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  #  Seeder — gerador/carga de dados sintéticos do Desafio 1 (one-shot)
  #  NÃO sobe no `docker compose up` (profile `tools`). Executar via:
  #    docker compose --profile tools run --rm seeder      (alvo `make seed`)
  #  Sobrescreva o volume com SEED_TX=N para variar a escala.
  # ===========================================================================
  seeder:
    build: ./desafio-1/seed
    image: trio-seeder:local
    profiles: ["tools"]
    logging: *default-logging
    environment:
      <<: *pg-common
      PGHOST: timescaledb
      PGPORT: "5432"
      PGDATABASE: trio_transactions
      SEED_TX: ${SEED_TX:-10000000}
      SEED_ACCOUNTS: ${SEED_ACCOUNTS:-50000}
      RNG_SEED: ${RNG_SEED:-42}
      SEED_BATCH: ${SEED_BATCH:-500000}
      SEED_RECON_RATE: ${SEED_RECON_RATE:-0.2}
      SEED_MISMATCH_RATE: ${SEED_MISMATCH_RATE:-0.03}
      SEED_WINDOW_DAYS: ${SEED_WINDOW_DAYS:-365}
      SEED_END_DATE: ${SEED_END_DATE:-2026-06-21}
    depends_on:
      timescaledb:
        condition: service_healthy

  # ===========================================================================
  #  Seeder do Legado — popula o PostgreSQL legado (trio_legado) — one-shot
  #  REUSA a mesma imagem do seeder (trio-seeder:local), trocando só o entrypoint
  #  e o destino (PGHOST/PGDATABASE). Executar via:
  #    docker compose --profile tools run --rm seeder-legado  (alvo `make seed-legado`)
  # ===========================================================================
  seeder-legado:
    build: ./desafio-1/seed
    image: trio-seeder:local
    profiles: ["tools"]
    logging: *default-logging
    command: ["python", "run_legacy.py"]
    environment:
      <<: *pg-common
      PGHOST: postgres-legado
      PGPORT: "5432"
      PGDATABASE: trio_legado
      SEED_USERS: ${SEED_USERS:-30000}
      SEED_ACCOUNTS_PER_USER: ${SEED_ACCOUNTS_PER_USER:-1.3}
      RNG_SEED: ${RNG_SEED:-42}
    depends_on:
      postgres-legado:
        condition: service_healthy

  # ===========================================================================
  #  Seeder do ClickHouse — popula trio_analytics.transactions — one-shot
  #  REUSA a imagem trio-seeder:local (entrypoint run_clickhouse.py) e generators.py
  #  (mesma SSOT de distribuições do TimescaleDB). Schema (make migrate-ch) ANTES,
  #  p/ as MVs materializarem na carga. Executar via:
  #    docker compose --profile tools run --rm seeder-clickhouse  (alvo `make seed-ch`)
  #  Suba CH_SEED_TX (ex.: 100000000) p/ validar a query sub-segundo no headline.
  # ===========================================================================
  seeder-clickhouse:
    build: ./desafio-1/seed
    image: trio-seeder:local
    profiles: ["tools"]
    logging: *default-logging
    command: ["python", "run_clickhouse.py"]
    environment:
      CH_HOST: clickhouse
      CH_HTTP_PORT: "8123"
      CH_DATABASE: trio_analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-trio}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-trio2024}
      CH_SEED_TX: ${CH_SEED_TX:-5000000}
      CH_SEED_BATCH: ${CH_SEED_BATCH:-1000000}
      CH_SEED_ACCOUNTS: ${CH_SEED_ACCOUNTS:-50000}
      RNG_SEED: ${RNG_SEED:-42}
      SEED_WINDOW_DAYS: ${SEED_WINDOW_DAYS:-365}
      SEED_END_DATE: ${SEED_END_DATE:-2026-06-21}
    depends_on:
      clickhouse:
        condition: service_healthy

  # ===========================================================================
  #  Pipeline de referência — full-refresh PostgreSQL legado -> ClickHouse — one-shot
  #  (Desafio 2, RF-4.4). REUSA a imagem trio-pipeline:local (entrypoint
  #  sync_pg_refs.py): materializa ref_institutions + SYSTEM RELOAD DICTIONARY.
  #  Executar via: docker compose --profile tools run --rm pipeline-refs  (make pipeline-refs)
  # ===========================================================================
  pipeline-refs:
    build: ./desafio-2/pipeline
    image: trio-pipeline:local
    profiles: ["tools"]
    logging: *default-logging
    command: ["python", "sync_pg_refs.py", "--once"]
    environment:
      <<: *pg-common
      PGHOST: postgres-legado
      PGPORT: "5432"
      PGDATABASE: trio_legado
      CH_HOST: clickhouse
      CH_HTTP_PORT: "8123"
      CH_DATABASE: trio_analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-trio}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-trio2024}
    depends_on:
      postgres-legado:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

volumes:
  timescaledb_data:
    driver: local
  postgres_legado_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: trio-data-network
    driver: bridge
