# =============================================================================
#  Grafana — Provisioning de Alertas (Sprint 06 · Story 6.6)
#  PoC: 1 contact point + 1 regra (pipeline lag > 300s / SEV-2) lendo o
#  ClickHouse (pipeline_runs). Os 7 alertas críticos e a integração CloudWatch/SNS
#  estão documentados em desafio-3/alerts.md. Montado em
#  /etc/grafana/provisioning/alerting.
# =============================================================================
apiVersion: 1

# Contact point de plantão. Webhook placeholder; em produção aponta para
# SNS / PagerDuty / Slack (ver alerts.md).
contactPoints:
  - orgId: 1
    name: trio-oncall
    receivers:
      - uid: trio-oncall-webhook
        type: webhook
        settings:
          url: https://example.com/trio-alert
          httpMethod: POST

# Roteia tudo para o plantão (PoC). Produção: rotas por severidade -> SNS topic.
policies:
  - orgId: 1
    receiver: trio-oncall
    group_by: ["grafana_folder", "alertname"]

groups:
  - orgId: 1
    name: trio-critical
    folder: Trio
    interval: 1m
    rules:
      - uid: pipeline-lag-sev2
        title: Pipeline lag alto (SEV-2)
        condition: C
        for: 5m
        labels:
          severity: sev2
          service: pipeline
        annotations:
          summary: "Lag do pipeline ts_to_ch > 300s — investigar atraso de sincronização"
          runbook: "desafio-2/README.md (pipeline) · desafio-3/alerts.md"
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: clickhouse
            model:
              refId: A
              datasource:
                type: grafana-clickhouse-datasource
                uid: clickhouse
              editorType: sql
              queryType: table
              format: 1
              rawSql: "SELECT max(lag_seconds) AS v FROM trio_analytics.pipeline_runs WHERE pipeline = 'ts_to_ch' AND started_at > now() - INTERVAL 1 HOUR"
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 3600
              to: 0
            model:
              refId: B
              type: reduce
              reducer: last
              expression: A
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 3600
              to: 0
            model:
              refId: C
              type: math
              expression: "$B > 300"
              datasource:
                type: __expr__
                uid: __expr__
